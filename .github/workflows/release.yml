name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Versao da release, exemplo: v1.0.0"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore .\apac_biblioteca.csproj --configfile .\NuGet.Config

      - name: Build installer
        run: .\scripts\build-installer.ps1 -NoRestore

      - name: Prepare release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts\release | Out-Null
          Copy-Item -LiteralPath .\Instalador\install.exe -Destination .\artifacts\release\APACDigitalSetup.exe -Force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: APAC Digital ${{ github.event.inputs.version || github.ref_name }}
          files: artifacts\release\APACDigitalSetup.exe
          generate_release_notes: true
